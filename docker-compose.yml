version: "3.9"

services:
  api-gateway:
    build: .
    container_name: accesorios-api-gateway
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - accesorios-network

networks:
  accesorios-network:
    external: true
    name: accesorios-network
