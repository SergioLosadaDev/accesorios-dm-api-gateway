services:
  api-gateway:
    build: .
    container_name: accesorios-dm-gateway-qa
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - NODE_ENV=qa
      - LOG_LEVEL=info
      - INVENTORY_HOST=accesorios-dm-inventory-service-qa
      - INVENTORY_PORT=8081
      - SECURITY_HOST=accesorios-dm-security-qa
      - SECURITY_PORT=8889
      - PAYMENT_HOST=accesorios-dm-payment-qa
      - PAYMENT_PORT=9001
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - accesorios-dm-net-qa

networks:
  accesorios-dm-net-qa:
    external: true
    name: accesorios-dm-database_accesorios-network-qa