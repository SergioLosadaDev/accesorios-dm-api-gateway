services:
  api-gateway:
    build: .
    container_name: accesorios-dm-gateway-dev
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - accesorios-dm-net

networks:
  accesorios-dm-net:
    external: true
    name: accesorios-dm-database_accesorios-network-dev